name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Verify required secrets
        run: |
          $missing = @()
          if (-not "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}") { $missing += "TAURI_SIGNING_PRIVATE_KEY" }
          if (-not "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}") { $missing += "TAURI_SIGNING_PRIVATE_KEY_PASSWORD" }
          if ($missing.Count -gt 0) {
            Write-Error "Missing required secrets: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All required secrets are configured"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_URL: ${{ secrets.API_URL }}
        with:
          tauriScript: npx tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Certificación Presupuestaria ${{ github.ref_name }}'
          releaseBody: 'Descarga el instalador .msi para Windows.'
          releaseDraft: false
          prerelease: false
          args: --verbose --bundles msi
